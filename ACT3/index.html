<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nginx-app</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #080b14;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, #1e3a5f55, transparent),
        radial-gradient(ellipse 60% 40% at 80% 110%, #312e8133, transparent);
    }

    .card {
      background: linear-gradient(145deg, #141824, #1a1d2e);
      border: 1px solid #2a2f4a;
      border-radius: 20px;
      padding: 3rem 4rem;
      text-align: center;
      box-shadow:
        0 0 0 1px #ffffff08,
        0 8px 40px rgba(0, 0, 0, 0.6),
        0 0 80px #6366f115;
    }

    .logo-icon {
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      margin: 0 auto 1.5rem;
      box-shadow: 0 4px 20px #6366f144;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #16a34a18;
      border: 1px solid #16a34a44;
      color: #4ade80;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }

    .badge::before {
      content: '';
      width: 6px;
      height: 6px;
      background: #4ade80;
      border-radius: 50%;
      animation: blink 2s infinite;
      box-shadow: 0 0 6px #4ade80;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.2;
      }
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #3d4a6b;
      margin-bottom: 1.5rem;
    }

    .host-box {
      background: #0d1020;
      border: 1px solid #2d3148;
      border-radius: 12px;
      padding: 0.85rem 1.2rem;
      margin-top: 1.5rem;
      text-align: left;
    }

    .host-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #3d4a6b;
      margin-bottom: 0.4rem;
    }

    .host-value {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.88rem;
      color: #4ade80;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="logo-icon">⚡</div>
    <div class="badge">running</div>
    <h1>Hola desde ECS</h1>
    <p class="subtitle">AWS ECS Fargate · cft-nginx-app</p>
    <div class="host-box">
      <div class="host-label">⚙ Container Host</div>
      <div class="host-value" id="hostname">resolviendo...</div>
    </div>
  </div>

  <script>
    fetch(window.location.href, { method: 'HEAD' })
      .then(r => {
        const host = r.headers.get('X-Served-By');
        document.getElementById('hostname').textContent = host || 'n/a';
      })
      .catch(() => {
        document.getElementById('hostname').textContent = 'n/a';
      });
  </script>
</body>

</html>
